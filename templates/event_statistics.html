<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Event Statistics</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<header>

    <h1>📊 Event Statistics Dashboard</h1>

</header>

<div class="container">

    <table>

        <thead>

            <tr>

                <th>Event Type</th>
                <th>Total Count</th>

            </tr>

        </thead>

        <tbody>

        {% for event in events %}

            <tr>

                <td>{{ event[0] }}</td>

                <td>{{ event[1] }}</td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

    <br>

    <a href="/" class="alerts-btn">

        🏠 Back to Dashboard

    </a>

</div>

<footer>

    <p>

        CyberDefender-SIEM © 2026 | Event Statistics Dashboard

    </p>

</footer>

</body>

</html>
