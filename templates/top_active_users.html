<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Top Active Users</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<header>

    <h1>👥 Top Active Users</h1>

</header>

<div class="container">

    <table>

        <thead>

            <tr>

                <th>User</th>
                <th>Total Events</th>
                <th>Successful Logins</th>
                <th>Failed Logins</th>

            </tr>

        </thead>

        <tbody>

        {% for user in users %}

            <tr>

                <td>{{ user[0] }}</td>

                <td>{{ user[1] }}</td>

                <td>{{ user[2] }}</td>

                <td>{{ user[3] }}</td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

    <br>

    <a href="/" class="alerts-btn">

        🏠 Back to Dashboard

    </a>

</div>

<footer>

    <p>

        CyberDefender-SIEM © 2026 | Top Active Users

    </p>

</footer>

</body>

</html>
