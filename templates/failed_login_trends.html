<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Failed Login Trends</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<header>

    <h1>📉 Failed Login Trends</h1>

</header>

<div class="container">

    <table>

        <thead>

            <tr>

                <th>IP Address</th>
                <th>Failed Login Attempts</th>

            </tr>

        </thead>

        <tbody>

        {% for row in trends %}

            <tr>

                <td>{{ row[0] }}</td>

                <td>{{ row[1] }}</td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

    <br>

    <a href="/" class="alerts-btn">

        🏠 Back to Dashboard

    </a>

</div>

<footer>

    <p>

        CyberDefender-SIEM © 2026 | Failed Login Trends

    </p>

</footer>

</body>

</html>
